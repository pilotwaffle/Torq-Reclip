name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python lint + import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Ruff check
        run: ruff check reclip.py

      - name: Import smoke test
        run: python -c "import reclip; assert reclip.app is not None"

  node-typecheck:
    name: Node typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run lint

  node-build:
    name: Node build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    # Skip if only docs changed
    if: |
      !contains(github.event.head_commit.message, '[skip docker]') &&
      (github.event_name != 'pull_request' ||
       !startsWith(github.event.pull_request.title, 'docs:'))
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: reclip:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
